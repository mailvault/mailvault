# CI for the MailVault backend (API + SMTP daemon + worker).
# Runs lint, unit + integration tests, build, govulncheck, and a security scan
# on every push to main and on every PR.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install tools
        run: make setup

      - name: Generate code
        run: make generate

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install tools
        run: make setup

      - name: Generate code
        run: make generate

      - name: Run tests
        # -short skips the dockertest pg-repo tests (run separately below).
        # Race detection on the unit tier surfaces goroutine bugs in the worker/queue
        # path that are easy to miss otherwise.
        run: go test -v -short -race -cover ./...

  integration:
    name: Integration (Postgres)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install tools
        run: make setup

      - name: Generate code
        run: make generate

      - name: Run pg repository tests (dockertest spins up Postgres)
        run: go test -v -count=1 ./gateways/repository/pg/...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install tools
        run: make setup

      - name: Generate code
        run: make generate

      - name: Build binaries
        run: make build

  vuln:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@latest

      - name: Run gosec
        run: make gosec
