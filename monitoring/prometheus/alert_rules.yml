# MailVault Alerting Rules
groups:
  - name: mailvault-api
    rules:
      # API Service Health
      - alert: MailVaultAPIDown
        expr: up{job="mailvault-api"} == 0
        for: 1m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "MailVault API service is down"
          description: "MailVault API service has been down for more than 1 minute"

      # High API Response Time
      - alert: HighAPIResponseTime
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket{job="mailvault-api"}[5m])) > 1
        for: 2m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "High API response time"
          description: "95th percentile response time is {{ $value }} seconds"

      # High Error Rate
      - alert: HighAPIErrorRate
        expr: rate(http_requests_total{job="mailvault-api",status_code=~"5.."}[5m]) / rate(http_requests_total{job="mailvault-api"}[5m]) > 0.1
        for: 5m
        labels:
          severity: critical
          service: api
        annotations:
          summary: "High API error rate"
          description: "Error rate is {{ $value | humanizePercentage }}"

      # Rate Limiting Violations
      - alert: HighRateLimitViolations
        expr: increase(rate_limit_violations_total{job="mailvault-api"}[5m]) > 100
        for: 2m
        labels:
          severity: warning
          service: api
        annotations:
          summary: "High rate limit violations"
          description: "{{ $value }} rate limit violations in the last 5 minutes"

  - name: mailvault-smtp
    rules:
      # SMTP Service Health
      - alert: MailVaultSMTPDown
        expr: up{job="mailvault-smtp"} == 0
        for: 1m
        labels:
          severity: critical
          service: smtp
        annotations:
          summary: "MailVault SMTP service is down"
          description: "MailVault SMTP service has been down for more than 1 minute"

      # High SMTP Connection Failures
      - alert: HighSMTPConnectionFailures
        expr: rate(smtp_connections_failed_total{job="mailvault-smtp"}[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: smtp
        annotations:
          summary: "High SMTP connection failure rate"
          description: "SMTP connection failure rate is {{ $value }} per second"

      # High Email Processing Time
      - alert: HighEmailProcessingTime
        expr: histogram_quantile(0.95, rate(smtp_email_processing_duration_seconds_bucket{job="mailvault-smtp"}[5m])) > 10
        for: 5m
        labels:
          severity: warning
          service: smtp
        annotations:
          summary: "High email processing time"
          description: "95th percentile email processing time is {{ $value }} seconds"

  - name: mailvault-database
    rules:
      # Database Connection Pool High Utilization
      - alert: DatabasePoolHighUtilization
        expr: (database_active_connections / database_total_connections) > 0.8
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database pool utilization is high"
          description: "Pool utilization is {{ $value | humanizePercentage }}"

      # Database Connection Failures
      - alert: DatabaseConnectionFailures
        expr: increase(database_connections_failed_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "Database connection failures detected"
          description: "{{ $value }} database connection failures in the last 5 minutes"

      # Database Health Check Failures
      - alert: DatabaseHealthCheckFailures
        expr: increase(database_health_check_failures_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "Database health check failures"
          description: "{{ $value }} health check failures in the last 5 minutes"

      # Slow Database Queries
      - alert: SlowDatabaseQueries
        expr: histogram_quantile(0.95, rate(database_query_duration_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "95th percentile query time is high"
          description: "Query time is {{ $value }} seconds"

  - name: mailvault-security
    rules:
      # Security Violations
      - alert: SecurityViolationsDetected
        expr: increase(security_violations_total[5m]) > 10
        for: 1m
        labels:
          severity: critical
          service: security
        annotations:
          summary: "Security violations detected"
          description: "{{ $value }} security violations in the last 5 minutes"

      # Authentication Failures
      - alert: HighAuthenticationFailures
        expr: rate(auth_attempts_total{status="failure"}[5m]) > 1
        for: 3m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "High authentication failure rate"
          description: "Authentication failure rate is {{ $value }} per second"

  - name: mailvault-system
    rules:
      # High CPU Usage
      - alert: HighCPUUsage
        expr: 100 - (avg(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%"

      # High Memory Usage
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          service: system
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}%"

      # Disk Space Low
      - alert: DiskSpaceLow
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) * 100 > 90
        for: 5m
        labels:
          severity: critical
          service: system
        annotations:
          summary: "Disk space is low"
          description: "Disk usage is {{ $value }}%"