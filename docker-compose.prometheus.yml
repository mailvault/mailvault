version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: mailvault-postgres
    environment:
      - POSTGRES_DB=mailvault
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mailvault-monitoring
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: mailvault-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mailvault-monitoring
    restart: unless-stopped
    command: redis-server --appendonly yes

  # MailVault API Service
  mailvault-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mailvault-api
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/mailvault?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - API_ADDRESS=:3000
      - METRICS_ADDRESS=:8080
      - AUTH_PROVIDER=supabase
      - AUTH_SECRET_KEY=${AUTH_SECRET_KEY:-dev-secret-change-me}
      - ENABLE_DATABASE_METRICS=true
      - ENABLE_QUERY_INSTRUMENTATION=true
    ports:
      - "3000:3000"  # API endpoints
      - "8080:8080"  # Metrics endpoint
    depends_on:
      - postgres
      - redis
    networks:
      - mailvault-monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # MailVault SMTP Server
  mailvault-smtp:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: mailvault-smtp
    command: ["./smtpd"]
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/mailvault?sslmode=disable
      - SMTP_ADDR=:25
      - SMTP_METRICS_PORT=8081
      - SMTP_DOMAIN=${SMTP_DOMAIN:-mail.localhost}
    ports:
      - "25:25"     # SMTP port
      - "8081:8081" # SMTP metrics port
    depends_on:
      - postgres
      - redis
    networks:
      - mailvault-monitoring
    restart: unless-stopped
  # Prometheus Server
  prometheus:
    image: prom/prometheus:latest
    container_name: mailvault-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - mailvault-monitoring
    restart: unless-stopped

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: mailvault-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    networks:
      - mailvault-monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # Node Exporter for system metrics
  node-exporter:
    image: prom/node-exporter:latest
    container_name: mailvault-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - mailvault-monitoring
    restart: unless-stopped

  # AlertManager for handling alerts
  alertmanager:
    image: prom/alertmanager:latest
    container_name: mailvault-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager:/etc/alertmanager
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - mailvault-monitoring
    restart: unless-stopped

  # Redis Exporter (if Redis caching is used)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: mailvault-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - mailvault-monitoring
    restart: unless-stopped
    depends_on:
      - redis

  # PostgreSQL Exporter
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: mailvault-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:postgres@postgres:5432/mailvault?sslmode=disable
    networks:
      - mailvault-monitoring
    restart: unless-stopped
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  alertmanager_data:

networks:
  mailvault-monitoring:
    driver: bridge