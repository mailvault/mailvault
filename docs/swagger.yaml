definitions:
  app_api_v1_auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/auth.UserResult'
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  auth.UserResult:
    properties:
      auth_provider:
        type: string
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  domains.CreateDomainRequest:
    properties:
      auto_create_address:
        type: boolean
      domain:
        maxLength: 253
        minLength: 1
        type: string
      public_key:
        minLength: 100
        type: string
      storage_enabled:
        type: boolean
      webhook_config:
        $ref: '#/definitions/domains.WebhookConfigRequest'
    required:
    - domain
    - public_key
    type: object
  domains.DomainResult:
    properties:
      api_key:
        type: string
      auto_create_address:
        type: boolean
      created_at:
        type: string
      domain:
        type: string
      id:
        type: string
      last_verification_attempt:
        type: string
      next_verification_attempt:
        type: string
      public_key:
        type: string
      storage_enabled:
        type: boolean
      updated_at:
        type: string
      verification_attempts:
        type: integer
      verification_error:
        type: string
      verification_status:
        description: Verification fields
        type: string
      verification_token:
        type: string
      webhook_config:
        $ref: '#/definitions/domains.WebhookConfigResult'
    type: object
  domains.UpdateDomainRequest:
    properties:
      auto_create_address:
        type: boolean
      public_key:
        type: string
      storage_enabled:
        type: boolean
      webhook_config:
        $ref: '#/definitions/domains.WebhookConfigRequest'
    type: object
  domains.WebhookConfigRequest:
    properties:
      enabled:
        type: boolean
      headers:
        additionalProperties:
          type: string
        type: object
      secret:
        maxLength: 256
        minLength: 16
        type: string
      url:
        maxLength: 2048
        type: string
    required:
    - url
    type: object
  domains.WebhookConfigResult:
    properties:
      enabled:
        type: boolean
      headers:
        additionalProperties:
          type: string
        type: object
      secret:
        type: string
      url:
        type: string
    type: object
  emailrender.AttachmentInfo:
    properties:
      cid:
        type: string
      content_type:
        type: string
      filename:
        type: string
      id:
        type: string
      is_inline:
        type: boolean
      size:
        type: integer
    type: object
  emailrender.ContentFormat:
    properties:
      content:
        type: string
      size:
        type: integer
      type:
        description: '"text/plain", "text/html", "text/markdown"'
        type: string
    type: object
  emailrender.EmailResponse:
    properties:
      attachment_count:
        type: integer
      attachments:
        description: Attachments metadata (content served separately)
        items:
          $ref: '#/definitions/emailrender.AttachmentInfo'
        type: array
      available_formats:
        description: Available content formats
        items:
          type: string
        type: array
      content:
        items:
          $ref: '#/definitions/emailrender.ContentFormat'
        type: array
      date:
        type: string
      from:
        type: string
      has_attachments:
        type: boolean
      id:
        type: string
      inline_image_count:
        type: integer
      is_multipart:
        description: Metadata
        type: boolean
      subject:
        type: string
    type: object
  emails.CreateEmailRequest:
    properties:
      forward_addresses:
        items:
          type: string
        type: array
      local_part:
        type: string
    required:
    - local_part
    type: object
  emails.EmailAddressResult:
    properties:
      created_at:
        type: string
      domain_id:
        type: string
      forward_addresses:
        items:
          type: string
        type: array
      full_address:
        type: string
      id:
        type: string
      local_part:
        type: string
      updated_at:
        type: string
    type: object
  emails.ParsedEmailResult:
    properties:
      available_formats:
        items:
          type: string
        type: array
      domain_name:
        type: string
      email_address:
        type: string
      from_address:
        type: string
      id:
        type: string
      parsed_content:
        $ref: '#/definitions/emailrender.EmailResponse'
      received_at:
        type: string
      rendering_error:
        type: string
      sequence_number:
        type: integer
      subject:
        type: string
    type: object
  emails.ReceivedEmailResult:
    properties:
      domain_name:
        type: string
      email_address:
        type: string
      encrypted_body:
        type: string
      from_address:
        type: string
      id:
        type: string
      received_at:
        type: string
      sequence_number:
        type: integer
      smtp_verification:
        $ref: '#/definitions/emails.SMTPVerificationResult'
      subject:
        type: string
    type: object
  emails.SMTPVerificationResult:
    properties:
      content_verdict:
        type: string
      dkim_domain:
        type: string
      dkim_selector:
        type: string
      dkim_valid:
        type: boolean
      dmarc_alignment_dkim:
        type: boolean
      dmarc_alignment_spf:
        type: boolean
      dmarc_policy:
        type: string
      dmarc_result:
        type: string
      final_action:
        type: string
      is_blacklisted:
        type: boolean
      is_quarantined:
        type: boolean
      reputation_score:
        type: number
      sender_domain:
        type: string
      sender_ip:
        type: string
      spam_score:
        type: number
      spf_mechanism:
        type: string
      spf_result:
        type: string
      verified_at:
        type: string
    type: object
  emails.UpdateEmailRequest:
    properties:
      forward_addresses:
        items:
          type: string
        type: array
    type: object
  models.DomainValidationResponse:
    description: Domain validation response with instructions and status
    properties:
      attempts:
        example: 1
        type: integer
      domain_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      domain_name:
        example: example.com
        type: string
      error:
        example: DNS records not found
        type: string
      instructions:
        $ref: '#/definitions/models.ValidationInstructions'
      last_attempt:
        example: "2023-01-01T00:00:00Z"
        type: string
      next_attempt:
        example: "2023-01-01T01:00:00Z"
        type: string
      status:
        example: pending
        type: string
      verification_token:
        example: abc123def456
        type: string
    type: object
  models.DomainValidationStatusResponse:
    description: Detailed domain validation status with history
    properties:
      attempts:
        example: 2
        type: integer
      can_retry:
        example: false
        type: boolean
      domain_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      domain_name:
        example: example.com
        type: string
      error:
        example: TXT record validation failed
        type: string
      history:
        items:
          $ref: '#/definitions/models.ValidationRecord'
        type: array
      is_verified:
        example: true
        type: boolean
      last_attempt:
        example: "2023-01-01T00:00:00Z"
        type: string
      next_attempt:
        example: "2023-01-01T01:00:00Z"
        type: string
      status:
        example: verified
        type: string
      txt_record:
        example: mailvault-verification=abc123def456
        type: string
      verification_token:
        example: abc123def456
        type: string
    type: object
  models.ErrorResponseBody:
    properties:
      error:
        example: Invalid request
        type: string
    type: object
  models.MXRecordInfo:
    description: MX record information
    properties:
      host:
        example: mail.mailvault.sh
        type: string
      priority:
        example: 10
        type: integer
    type: object
  models.MXRecordInstructions:
    description: MX record setup instructions
    properties:
      example:
        type: string
      instructions:
        example: Add these MX records to your DNS configuration
        type: string
      required_records:
        items:
          $ref: '#/definitions/models.MXRecordInfo'
        type: array
    type: object
  models.PaginatedResponse:
    properties:
      data: {}
      pagination:
        properties:
          limit:
            example: 10
            type: integer
          offset:
            example: 0
            type: integer
          total:
            example: 100
            type: integer
        type: object
    type: object
  models.TXTRecordInstructions:
    description: TXT record setup instructions for domain verification
    properties:
      example:
        type: string
      instructions:
        example: Add this TXT record to verify domain ownership
        type: string
      record_name:
        example: example.com
        type: string
      record_value:
        example: mailvault-verification=abc123def456
        type: string
    type: object
  models.ValidationDetails:
    description: Detailed validation results including DNS records found
    properties:
      dns_server:
        example: 8.8.8.8:53
        type: string
      error_details:
        example: Connection timeout
        type: string
      expected_mx_servers:
        example:
        - '["mail.mailvault.sh"'
        - ' "mail2.mailvault.sh"]'
        items:
          type: string
        type: array
      expected_txt_record:
        example: mailvault-verification=abc123def456
        type: string
      found_mx_records:
        items:
          $ref: '#/definitions/models.MXRecordInfo'
        type: array
      found_txt_records:
        example:
        - '["mailvault-verification=abc123def456"]'
        items:
          type: string
        type: array
      mx_validation_passed:
        example: true
        type: boolean
      query_time:
        example: 250ms
        type: string
      retry_count:
        example: 0
        type: integer
      txt_validation_passed:
        example: true
        type: boolean
    type: object
  models.ValidationInstructions:
    description: DNS setup instructions for domain validation
    properties:
      mx_records:
        $ref: '#/definitions/models.MXRecordInstructions'
      txt_record:
        $ref: '#/definitions/models.TXTRecordInstructions'
    type: object
  models.ValidationInstructionsResponse:
    description: Complete validation instructions for domain setup
    properties:
      domain_id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      domain_name:
        example: example.com
        type: string
      instructions:
        $ref: '#/definitions/models.ValidationInstructions'
      status:
        example: pending
        type: string
      troubleshooting_tips:
        items:
          type: string
        type: array
      verification_steps:
        items:
          type: string
        type: array
      verification_token:
        example: abc123def456
        type: string
    type: object
  models.ValidationRecord:
    description: Individual validation attempt record
    properties:
      completed_at:
        example: "2023-01-01T00:00:30Z"
        type: string
      created_at:
        example: "2023-01-01T00:00:00Z"
        type: string
      details:
        $ref: '#/definitions/models.ValidationDetails'
      error_message:
        example: DNS timeout
        type: string
      id:
        example: 123e4567-e89b-12d3-a456-426614174000
        type: string
      started_at:
        example: "2023-01-01T00:00:00Z"
        type: string
      status:
        example: success
        type: string
      validation_type:
        example: full_validation
        type: string
    type: object
  send.SendEmailRequest:
    properties:
      bcc:
        items:
          type: string
        type: array
      cc:
        items:
          type: string
        type: array
      from:
        type: string
      html_body:
        type: string
      subject:
        type: string
      text_body:
        type: string
      to:
        items:
          type: string
        minItems: 1
        type: array
    required:
    - from
    - subject
    - to
    type: object
  send.SendEmailResponse:
    properties:
      message_id:
        type: string
      status:
        type: string
    type: object
  users.UserResult:
    properties:
      created_at:
        type: string
      email:
        type: string
      id:
        type: string
    type: object
  v1.HealthCheck:
    properties:
      duration:
        type: string
      error:
        type: string
      status:
        type: string
    type: object
  v1.HealthResponse:
    properties:
      checks:
        additionalProperties:
          $ref: '#/definitions/v1.HealthCheck'
        type: object
      status:
        type: string
      timestamp:
        type: string
      version:
        type: string
    type: object
info:
  contact: {}
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/app_api_v1_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      summary: Login user
      tags:
      - Authentication
  /auth/me:
    get:
      description: Get information about the currently authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: Current user information
          schema:
            $ref: '#/definitions/users.UserResult'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "404":
          description: User not found
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get current user
      tags:
      - Authentication
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account with email and password
      parameters:
      - description: Registration details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      summary: Register a new user
      tags:
      - Authentication
  /domains:
    get:
      description: Retrieve all domains belonging to the authenticated user
      produces:
      - application/json
      responses:
        "200":
          description: List of user domains
          schema:
            items:
              $ref: '#/definitions/domains.DomainResult'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get user domains
      tags:
      - Domains
    post:
      consumes:
      - application/json
      description: Register a new domain for the authenticated user with user-provided
        encryption public key and optional webhook configuration
      parameters:
      - description: Domain creation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domains.CreateDomainRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Domain created successfully
          schema:
            $ref: '#/definitions/domains.DomainResult'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Create a new domain
      tags:
      - Domains
  /domains/{domainId}/emails:
    get:
      description: Retrieve all email addresses configured for a specific domain
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: List of email addresses
          schema:
            items:
              $ref: '#/definitions/emails.EmailAddressResult'
            type: array
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get domain email addresses
      tags:
      - Emails
    post:
      consumes:
      - application/json
      description: Create a new email address for a specific domain with optional
        forwarding settings
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      - description: Email address creation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/emails.CreateEmailRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Email address created successfully
          schema:
            $ref: '#/definitions/emails.EmailAddressResult'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Create email address
      tags:
      - Emails
  /domains/{domainId}/emails/{emailId}:
    delete:
      description: Delete an email address and all associated received emails
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      - description: Email Address ID
        format: uuid
        in: path
        name: emailId
        required: true
        type: string
      responses:
        "204":
          description: Email address deleted successfully
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Delete email address
      tags:
      - Emails
    get:
      description: Retrieve a specific email address by its ID
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      - description: Email Address ID
        format: uuid
        in: path
        name: emailId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Email address details
          schema:
            $ref: '#/definitions/emails.EmailAddressResult'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "404":
          description: Email address not found
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get email address by ID
      tags:
      - Emails
    put:
      consumes:
      - application/json
      description: Update email address settings such as forwarding configuration
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      - description: Email Address ID
        format: uuid
        in: path
        name: emailId
        required: true
        type: string
      - description: Email address update details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/emails.UpdateEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email address updated successfully
          schema:
            $ref: '#/definitions/emails.EmailAddressResult'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Update email address
      tags:
      - Emails
  /domains/{domainId}/emails/{emailId}/received:
    get:
      description: Retrieve received emails for a specific email address with pagination
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: domainId
        required: true
        type: string
      - description: Email Address ID
        format: uuid
        in: path
        name: emailId
        required: true
        type: string
      - default: 10
        description: Number of emails per page
        in: query
        name: limit
        type: integer
      - default: 0
        description: Number of emails to skip
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Paginated list of received emails
          schema:
            $ref: '#/definitions/models.PaginatedResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get received emails
      tags:
      - Emails
  /domains/{id}:
    delete:
      description: Delete a domain and all associated email addresses and received
        emails
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      responses:
        "204":
          description: Domain deleted successfully
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "404":
          description: Domain not found or does not belong to user
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Delete domain
      tags:
      - Domains
    get:
      description: Retrieve a specific domain by its ID (must belong to authenticated
        user)
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Domain details
          schema:
            $ref: '#/definitions/domains.DomainResult'
        "400":
          description: Bad request - invalid domain ID
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "403":
          description: Forbidden - domain does not belong to user
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "404":
          description: Domain not found
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      security:
      - BearerAuth: []
      summary: Get domain by ID
      tags:
      - Domains
    put:
      consumes:
      - application/json
      description: Update domain settings including public key, verification status,
        and webhook configuration
      parameters:
      - description: Domain ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Domain update details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domains.UpdateDomainRequest'
      produces:
      - application/json
      responses:
        "200":
