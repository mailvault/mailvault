info:
  contact: {}
paths:
  /auth/confirm:
    post:
      consumes:
      - application/json
      description: Confirm user email with verification token or OTP
      parameters:
      - description: Confirmation details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ConfirmEmailRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email confirmed successfully
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      summary: Confirm email
      tags:
      - Authentication
  /auth/confirm-token:
    post:
      consumes:
      - application/json
      description: Confirm user email using Supabase access token from callback URL
        fragment
      parameters:
      - description: Access token from Supabase
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.ConfirmEmailWithTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Email confirmed successfully
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/models.ErrorResponseBody'
      summary: Confirm email with access token
      tags:
      - Authentication
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user with email and password
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/github_com_mailvault_mailvault_app_api_v1_auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
